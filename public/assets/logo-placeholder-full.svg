<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" fill="none" role="img" aria-label="Maison Marquise — Logo placeholder">
  <!-- Zone de fond transparent -->
  <!-- Signature scriptée (simulation Parisienne) -->
  <text
    x="180" y="72"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="58"
    font-weight="400"
    font-style="italic"
    letter-spacing="-1"
    fill="#111111"
  >Maison Marquise</text>
  <!-- Filet or champagne -->
  <line x1="40" y1="84" x2="320" y2="84" stroke="#B99A5F" stroke-width="0.75" opacity="0.6"/>
  <!-- Baseline -->
  <text
    x="180" y="104"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="9"
    font-weight="500"
    letter-spacing="4"
    fill="#4A4A4A"
  >BIEN PLUS QU'UNE BOULANGERIE</text>
</svg>
