  ⚠️  PLACEHOLDER — Remplacer par : /public/assets/logo-horizontal.svg
  Version horizontale : monogramme M + nom + baseline sur une seule ligne.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" fill="none" role="img" aria-label="Maison Marquise — version horizontale">
  <!-- Monogramme M -->
  <text x="36" y="58" font-family="Georgia, serif" font-size="52" font-weight="300" font-style="italic" fill="#111111">M</text>
  <!-- Séparateur vertical -->
  <line x1="72" y1="18" x2="72" y2="62" stroke="#B99A5F" stroke-width="0.75" opacity="0.5"/>
  <!-- Groupe droit : nom + baseline -->
  <text x="84" y="42" font-family="Georgia, serif" font-size="26" font-weight="400" font-style="italic" fill="#111111" letter-spacing="-0.5">Maison Marquise</text>
  <text x="86" y="60" font-family="Arial, sans-serif" font-size="7.5" font-weight="500" fill="#4A4A4A" letter-spacing="3">BIEN PLUS QU'UNE BOULANGERIE</text>
</svg>
